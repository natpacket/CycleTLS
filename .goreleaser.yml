version: 2
project_name: cycletls

# Note: no `before.hooks` — `go mod tidy` would walk the whole repo and fail
# on legacy relative imports under tests/golang/. The build itself only
# touches ./src which has a clean module.

builds:
  - id: cycletls
    dir: ./src
    main: ./
    binary: cycletls
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "0.0.0-snapshot-{{ .ShortCommit }}"

git:
  tag_sort: -version:refname
  prerelease_suffix: "-pre"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^Merge'

release:
  draft: false
  prerelease: auto
  mode: append
