name: 🚀 GoReleaser

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [created, published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          # On a tag push or release event, do a real release.
          # On a regular push to main, build snapshot artifacts (no tag, no GitHub release).
          args: >-
            release --clean
            ${{ (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') && '' || '--snapshot' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: cycletls-snapshot-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 14
